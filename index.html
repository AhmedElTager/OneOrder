<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OneOrder | فخامة الشحن</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #0f172a; color: white; }
        .gold-text { color: #fbbf24; }
        .gold-bg { background-color: #fbbf24; }
        .card-bg { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); }
    </style>
</head>
<body>

    <!-- الزر العائم للواتساب -->
    <a href="https://wa.me/201024941083" target="_blank" class="fixed bottom-8 left-8 z-50 bg-green-500 p-4 rounded-full shadow-2xl hover:scale-110 transition-transform">
        <i class="fab fa-whatsapp text-3xl text-white"></i>
    </a>

    <!-- الهيدر -->
    <nav class="p-6 flex justify-between items-center container mx-auto">
        <h1 class="text-3xl font-black italic gold-text">ONEORDER</h1>
        <div class="space-x-8 space-x-reverse">
            <a href="#services" class="hover:text-amber-400 transition">خدماتنا</a>
            <a href="#contact" class="border border-amber-400 px-6 py-2 rounded-full hover:bg-amber-400 hover:text-black transition">تواصل معنا</a>
        </div>
    </nav>

    <!-- البطل (Hero) -->
    <header class="h-[80vh] flex flex-col justify-center items-center text-center px-4">
        <h2 data-aos="zoom-out" class="text-6xl md:text-8xl font-black mb-6">نجمع .. <span class="gold-text">نغلف</span> .. نشحن</h2>
        <p data-aos="fade-up" class="text-xl text-gray-400 mb-10 max-w-2xl">كل أوردراتك من كل المكاتب في شحنة واحدة فائقة السرعة.</p>
        <a data-aos="fade-up" data-aos-delay="200" href="https://wa.me/201024941083" class="gold-bg text-black px-12 py-4 rounded-full font-bold text-lg hover:bg-white transition-all">ابدأ الآن</a>
    </header>

    <!-- الخدمات -->
    <section id="services" class="py-24 container mx-auto px-4">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
            <div data-aos="flip-left" class="card-bg p-8 rounded-3xl border border-gray-700 hover:border-amber-400 transition">
                <i class="fas fa-shopping-cart text-4xl gold-text mb-6"></i>
                <h3 class="text-xl font-bold mb-2">طلب ذكي</h3>
                <p class="text-gray-400">نجمع طلباتك من أي موقع أو مكتب.</p>
            </div>
            <!-- كرري نفس النمط لباقي الخطوات -->
            <div data-aos="flip-left" data-aos-delay="100" class="card-bg p-8 rounded-3xl border border-gray-700 hover:border-amber-400 transition">
                <i class="fas fa-box-open text-4xl gold-text mb-6"></i>
                <h3 class="text-xl font-bold mb-2">تغليف فاخر</h3>
                <p class="text-gray-400">حماية فائقة لكل قطعة.</p>
            </div>
            <div data-aos="flip-left" data-aos-delay="200" class="card-bg p-8 rounded-3xl border border-gray-700 hover:border-amber-400 transition">
                <i class="fas fa-truck-loading text-4xl gold-text mb-6"></i>
                <h3 class="text-xl font-bold mb-2">تجميع</h3>
                <p class="text-gray-400">كل الأوردرات في طرد واحد.</p>
            </div>
            <div data-aos="flip-left" data-aos-delay="300" class="card-bg p-8 rounded-3xl border border-gray-700 hover:border-amber-400 transition">
                <i class="fas fa-shipping-fast text-4xl gold-text mb-6"></i>
                <h3 class="text-xl font-bold mb-2">شحن سريع</h3>
                <p class="text-gray-400">توصيل لباب بيتك.</p>
            </div>
        </div>
    </section>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>AOS.init({ duration: 1000 });</script>
</body>
</html>
