<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OneOrder - شحنك في مكان واحد</title>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; --accent: #10b981; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden; }
        
        /* تصميم الهيدر مع فيديو خلفية */
        .hero { position: relative; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center; overflow: hidden; }
        .video-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 0; }
        
        .content { position: relative; z-index: 1; }
        .btn { padding: 1.2rem 3rem; background: var(--accent); color: white; border-radius: 50px; font-weight: bold; text-decoration: none; transition: 0.4s; }
        .btn:hover { transform: scale(1.1); }
        
        .container { max-width: 1000px; margin: auto; padding: 2rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; }
        .card { background: white; padding: 2rem; border-radius: 20px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.1); transition: 0.5s; border: 1px solid #ddd; }
        .card:hover { transform: translateY(-15px); }
    </style>
</head>
<body>

<div class="hero">
    <video autoplay muted loop class="video-bg">
        <source src="https://www.w3schools.com/howto/rain.mp4" type="video/mp4">
    </video>
    <div class="overlay"></div>
    <div class="content">
        <h1>OneOrder</h1>
        <h2>كل اوردراتك في شحنة واحدة</h2>
        <a href="#about" class="btn">ابدأ الآن</a>
    </div>
</div>

<div class="container" id="about">
    <section data-aos="fade-up">
        <h2>لماذا OneOrder؟</h2>
        <div class="grid">
            <div class="card">📦 شحنة موحدة</div>
            <div class="card">💰 توفير تكاليف</div>
            <div class="card">✅ مراجعة جودة</div>
        </div>
    </section>
</div>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
    AOS.init({ duration: 1000 });
</script>

</body>
</html>
